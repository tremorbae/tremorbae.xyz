        <div class="video-wrap">
          <video id="video" src="assets/video/aligator5005.mp4" playsinline></video>

        </div>
        <audio id="audio" src="assets/audio/kevinhilfiger ft. lil rhinestone - waste my time.mp3" preload="auto"></audio>
      </div>
    </div>

    <!-- Window: Network -->
    <div class="window chat-window" id="network-window">

      </div>
    </div>

    <!-- Window 2: 90 Day Timer -->

          <img src="assets/img/runningtrem1.png" class="run-frame frame-1" alt="" />
          <img src="assets/img/runningtrem2.png" class="run-frame frame-2" alt="" />
        </div>
        <div class="countdown" id="countdown">
          <div class="cd-unit"><span class="cd-num" id="cdDays">00</span><span class="cd-label">Days</span></div>
          <span class="cd-sep">:</span>
          <div class="cd-unit"><span class="cd-num" id="cdHours">00</span><span class="cd-label">Hours</span></div>
          <span class="cd-sep">:</span>
          <div class="cd-unit"><span class="cd-num" id="cdMinutes">00</span><span class="cd-label">Minutes</span></div>
          <span class="cd-sep">:</span>
          <div class="cd-unit"><span class="cd-num" id="cdSeconds">00</span><span class="cd-label">Seconds</span></div>
        </div>
        <div class="progress-outer">
          <div class="progress-inner" id="progressInner"></div>
        </div>
